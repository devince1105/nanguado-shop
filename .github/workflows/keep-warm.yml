name: Keep API warm

# 每 10 分鐘 ping 一次 Render API，避免免費方案休眠造成冷啟動。
# 也可到 Actions 頁面手動觸發（workflow_dispatch）。
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          echo "Pinging API at $(date -u)"
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            --max-time 90 --retry 2 \
            https://nanguado-shop-api.onrender.com/api/v1/products || true
